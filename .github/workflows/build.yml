name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary: game-engine
            features: ""
          - os: macos-latest
            platform: macos-aarch64
            binary: game-engine
            features: "--no-default-features"
          - os: windows-latest
            platform: windows-x86_64
            binary: game-engine.exe
            features: "--no-default-features"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Configure SSH for private deps
        env:
          SSH_KEY: ${{ secrets.PRIVATE_REPO_SSH_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev \
            libvulkan-dev

      - name: Build release
        run: cargo build --release ${{ matrix.features }}

      - name: Prepare artifact
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 -q | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
          ARTIFACT="game-engine-${VERSION}-${{ matrix.platform }}"
          if [ "${{ matrix.platform }}" = "windows-x86_64" ]; then
            ARTIFACT="${ARTIFACT}.exe"
          fi
          cp "target/release/${{ matrix.binary }}" "$ARTIFACT"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: game-engine-${{ matrix.platform }}
          path: game-engine-*

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Deploy to file server
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          HOST="$DEPLOY_HOST"
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          SSH_OPTS="-i ~/.ssh/deploy_key"
          REMOTE_DIR="/docker-volumes/file-server/data"

          for dir in artifacts/game-engine-*/; do
            scp $SSH_OPTS "$dir"/game-engine-* "$HOST:${REMOTE_DIR}/"
          done

          # Regenerate manifest
          ssh $SSH_OPTS "$HOST" "cd /repos/sakuin/ops && docker compose run --rm file-server manifest /data"

          echo "Deployed"
